name: CI 测试

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4
    
    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: 运行测试
      id: pytest
      continue-on-error: true
      run: pytest
    
    - name: 上传测试结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 测试结果
        path: |
          .pytest_cache/
          test-results/
